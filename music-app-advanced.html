<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SoundWave Lite - 真实音乐应用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #FF6B35;
            --secondary-color: #FF8C42;
            --accent-color: #FF4500;
            --bg-dark: #1a0f08;
            --bg-darker: #0d0704;
            --text-primary: #FFFFFF;
            --text-secondary: #D4A574;
            --border-color: #5c3a24;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-darker) 0%, var(--bg-dark) 100%);
            color: var(--text-primary);
            height: 100vh;
        }

        .container {
            max-width: 430px;
            height: 100vh;
            margin: 0 auto;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .header-icons {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .icon-btn:hover {
            background: rgba(255, 107, 53, 0.3);
            transform: scale(1.1);
        }

        .search-box {
            padding: 12px 16px;
            display: flex;
            gap: 8px;
        }

        .search-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-btn {
            background: var(--primary-color);
            border: none;
            border-radius: 8px;
            color: var(--bg-dark);
            padding: 8px 16px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .search-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.5);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin: 16px 0 12px 0;
            color: var(--primary-color);
        }

        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .music-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .music-card:hover {
            background: rgba(255, 107, 53, 0.1);
            border-color: var(--primary-color);
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(255, 107, 53, 0.2);
        }

        .music-cover {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .music-title {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .music-artist {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player {
            padding: 16px;
            border-top: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.3);
        }

        .now-playing {
            margin-bottom: 12px;
        }

        .now-playing-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .now-playing-info {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .player-controls {
            display: flex;
            justify-content: center;
            gap: 16px;
            align-items: center;
            margin: 12px 0;
        }

        .play-btn {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 50%;
            color: var(--bg-dark);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 16px rgba(255, 107, 53, 0.5);
        }

        .control-btn {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .control-btn:hover {
            background: rgba(255, 107, 53, 0.3);
        }

        .progress-bar {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 8px;
            cursor: pointer;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary-color);
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.3);
        }

        .tab-btn {
            flex: 1;
            padding: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: var(--bg-dark);
            border-color: var(--primary-color);
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100px;
            color: var(--text-secondary);
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255, 107, 53, 0.3);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            color: var(--secondary-color);
            padding: 12px;
            background: rgba(255, 107, 157, 0.1);
            border-radius: 8px;
            font-size: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 32px 16px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        @media (max-width: 480px) {
            .music-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 SoundWave</h1>
            <div class="header-icons">
                <button class="icon-btn" title="设置">⚙️</button>
                <button class="icon-btn" title="关于">ℹ️</button>
            </div>
        </div>

        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索歌曲、歌手...">
            <button class="search-btn" id="searchBtn">搜索</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="trending">热门</button>
            <button class="tab-btn" data-tab="search">搜索结果</button>
            <button class="tab-btn" data-tab="favorites">❤️ 收藏</button>
        </div>

        <div class="content" id="content">
            <div id="trendingTab">
                <div class="section-title">🔥 热门歌曲</div>
                <div class="loading">
                    <div class="spinner"></div>
                    加载中...
                </div>
            </div>

            <div id="searchTab" style="display:none;">
                <div class="empty-state">
                    <div class="empty-state-icon">🔍</div>
                    <div>搜索歌曲开始播放</div>
                </div>
            </div>

            <div id="favoritesTab" style="display:none;">
                <div class="empty-state">
                    <div class="empty-state-icon">❤️</div>
                    <div>还没有收藏歌曲</div>
                </div>
            </div>
        </div>

        <div class="player">
            <div class="now-playing">
                <div class="now-playing-title" id="nowTitle">选择一首歌曲播放</div>
                <div class="now-playing-info" id="nowArtist">暂无信息</div>
            </div>

            <div class="player-controls">
                <button class="control-btn" id="prevBtn">⏮</button>
                <button class="play-btn" id="playBtn">▶️</button>
                <button class="control-btn" id="nextBtn">⏭</button>
                <button class="control-btn" id="favoriteBtn">🤍</button>
            </div>

            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-display">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <audio id="audioPlayer" style="display:none;"></audio>
    </div>

    <script>
        // ============ 核心状态管理 ============
        const state = {
            currentSong: null,
            isPlaying: false,
            playlist: [],
            favorites: JSON.parse(localStorage.getItem('soundwave_favorites') || '[]'),
            currentTab: 'trending'
        };

        // ============ DOM 元素 ============
        const audioPlayer = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const favoriteBtn = document.getElementById('favoriteBtn');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeDisplay = document.getElementById('currentTime');
        const durationDisplay = document.getElementById('duration');
        const nowTitle = document.getElementById('nowTitle');
        const nowArtist = document.getElementById('nowArtist');
        const content = document.getElementById('content');

        // ============ API 集成 ============

        // 获取热门歌曲 (使用 Last.fm API)
        async function getTrendingMusic() {
            try {
                // 使用示例数据 (真实版本需要 API KEY)
                const mockTrending = [
                    { id: '001', title: '晴天', artist: '周杰伦', cover: '🎸', url: null },
                    { id: '002', title: '稻香', artist: '周杰伦', cover: '🌾', url: null },
                    { id: '003', title: '千里之外', artist: '周杰伦', cover: '🚀', url: null },
                    { id: '004', title: '最长的电影', artist: '周杰伦', cover: '🎬', url: null },
                    { id: '005', title: '双截棍', artist: '周杰伦', cover: '🥊', url: null },
                    { id: '006', title: '夜曲', artist: '周杰伦', cover: '🌙', url: null }
                ];

                return mockTrending;
            } catch (error) {
                console.error('获取热门歌曲失败:', error);
                return [];
            }
        }

        // 搜索歌曲
        async function searchMusic(keyword) {
            try {
                // 使用示例数据 (真实版本需要 QQ 音乐 API)
                const mockResults = [
                    { id: `s_${Math.random()}`, title: `${keyword}`, artist: '演唱者', cover: '🎤', url: null },
                    { id: `s_${Math.random()}`, title: `${keyword} (Remix)`, artist: '演唱者', cover: '🔊', url: null }
                ];

                return mockResults;
            } catch (error) {
                console.error('搜索失败:', error);
                return [];
            }
        }

        // ============ UI 渲染 ============

        function renderMusicGrid(songs, containerId) {
            const container = document.getElementById(containerId) || content;
            
            if (!songs || songs.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🎵</div><div>没有找到歌曲</div></div>';
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'music-grid';

            songs.forEach(song => {
                const card = document.createElement('div');
                card.className = 'music-card';
                card.innerHTML = `
                    <div class="music-cover">${song.cover}</div>
                    <div class="music-title">${song.title}</div>
                    <div class="music-artist">${song.artist}</div>
                `;
                card.onclick = () => playSong(song);
                grid.appendChild(card);
            });

            container.innerHTML = '<div class="section-title">🎵 搜索结果</div>';
            container.appendChild(grid);
        }

        // ============ 播放控制 ============

        function playSong(song) {
            state.currentSong = song;
            nowTitle.textContent = song.title;
            nowArtist.textContent = song.artist;
            
            // 实际应用中需要获取真实音乐 URL
            if (song.url) {
                audioPlayer.src = song.url;
                audioPlayer.play();
                state.isPlaying = true;
                playBtn.textContent = '⏸';
            } else {
                // 演示模式
                nowArtist.textContent = song.artist + ' (演示 - 需要真实音乐源)';
            }

            updateFavoriteButton();
        }

        function togglePlay() {
            if (!state.currentSong) {
                alert('请先选择一首歌曲');
                return;
            }

            if (state.isPlaying) {
                audioPlayer.pause();
                state.isPlaying = false;
                playBtn.textContent = '▶️';
            } else {
                audioPlayer.play();
                state.isPlaying = true;
                playBtn.textContent = '⏸';
            }
        }

        function toggleFavorite() {
            if (!state.currentSong) return;

            const idx = state.favorites.findIndex(s => s.id === state.currentSong.id);
            if (idx >= 0) {
                state.favorites.splice(idx, 1);
                favoriteBtn.textContent = '🤍';
            } else {
                state.favorites.push(state.currentSong);
                favoriteBtn.textContent = '❤️';
            }

            localStorage.setItem('soundwave_favorites', JSON.stringify(state.favorites));
        }

        function updateFavoriteButton() {
            if (!state.currentSong) return;
            const isFavorite = state.favorites.some(s => s.id === state.currentSong.id);
            favoriteBtn.textContent = isFavorite ? '❤️' : '🤍';
        }

        // ============ 时间更新 ============

        audioPlayer.addEventListener('timeupdate', () => {
            const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progressFill.style.width = progress + '%';
            currentTimeDisplay.textContent = formatTime(audioPlayer.currentTime);
            durationDisplay.textContent = formatTime(audioPlayer.duration);
        });

        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audioPlayer.currentTime = percent * audioPlayer.duration;
        });

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // ============ 事件监听 ============

        playBtn.onclick = togglePlay;
        favoriteBtn.onclick = toggleFavorite;

        searchBtn.onclick = async () => {
            const keyword = searchInput.value.trim();
            if (!keyword) return;

            content.innerHTML = '<div class="loading"><div class="spinner"></div>搜索中...</div>';
            const results = await searchMusic(keyword);
            renderMusicGrid(results, 'searchTab');
            state.currentTab = 'search';
        };

        // 标签切换
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const tab = btn.dataset.tab;
                if (tab === 'trending') {
                    loadTrending();
                } else if (tab === 'search') {
                    const tab = document.getElementById('searchTab');
                    tab.style.display = 'block';
                    content.innerHTML = tab.innerHTML;
                } else if (tab === 'favorites') {
                    renderMusicGrid(state.favorites, 'favoritesTab');
                    const tab = document.getElementById('favoritesTab');
                    tab.style.display = 'block';
                    content.innerHTML = tab.innerHTML;
                    if (state.favorites.length > 0) {
                        const grid = document.createElement('div');
                        grid.className = 'music-grid';
                        state.favorites.forEach(song => {
                            const card = document.createElement('div');
                            card.className = 'music-card';
                            card.innerHTML = `
                                <div class="music-cover">${song.cover}</div>
                                <div class="music-title">${song.title}</div>
                                <div class="music-artist">${song.artist}</div>
                            `;
                            card.onclick = () => playSong(song);
                            grid.appendChild(card);
                        });
                        content.innerHTML = '<div class="section-title">❤️ 我的收藏</div>';
                        content.appendChild(grid);
                    }
                }
            };
        });

        // ============ 初始化 ============

        async function loadTrending() {
            content.innerHTML = '<div class="loading"><div class="spinner"></div>加载中...</div>';
            const songs = await getTrendingMusic();
            
            const grid = document.createElement('div');
            grid.className = 'music-grid';

            songs.forEach(song => {
                const card = document.createElement('div');
                card.className = 'music-card';
                card.innerHTML = `
                    <div class="music-cover">${song.cover}</div>
                    <div class="music-title">${song.title}</div>
                    <div class="music-artist">${song.artist}</div>
                `;
                card.onclick = () => playSong(song);
                grid.appendChild(card);
            });

            content.innerHTML = '<div class="section-title">🔥 热门歌曲</div>';
            content.appendChild(grid);
        }

        // 页面加载时初始化
        loadTrending();
    </script>
</body>
</html>
